<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craft World Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-content">
        <h1>Craft World</h1>
        <span class="subtitle">Factory Tracker</span>
      </div>
      <div class="network-badge">Ronin</div>
    </header>

    <div class="input-group">
      <input type="text" id="walletInput" placeholder="Wallet 0x... o nombre.ronin" spellcheck="false">
      <button id="updateBtn">Actualizar</button>
    </div>

    <div id="statusBar" class="status-bar hidden"></div>

    <div id="cooldownBar" class="cooldown-bar hidden">
      <span class="cooldown-icon">&#9200;</span>
      <span>Próxima actualización en <span id="countdown">5:00</span></span>
    </div>

    <div id="results">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <p class="empty-title">Sin datos</p>
        <p class="empty-desc">Ingresa una wallet y presiona Actualizar</p>
      </div>
      <div id="loadingState" class="loading-state hidden">
        <div class="spinner"></div>
        <p>Consultando blockchain...</p>
      </div>
      <div id="factoryList" class="factory-list hidden"></div>
    </div>

    <footer>
      <span class="footer-text">Datos on-chain &middot; Ronin Network</span>
    </footer>
  </div>
  <script src="ethers.umd.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
